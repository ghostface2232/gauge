# Builds the per-user installer and creates a DRAFT GitHub Release whenever a version
# tag (e.g. v0.1.0) is pushed. The draft carries the installer asset and auto-generated
# notes as a starting point; writing the final release notes and publishing the release
# are done manually. The in-app updater reads the same <Version>, so the tag must match
# Gauge.csproj's <Version> prefixed with "v" (and the updater only sees it once published).
#
# Local alternative: pwsh -File release.ps1 -Draft (see README).
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: pwsh -File build-installer.ps1

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # Creates a DRAFT release with the installer asset and auto-generated notes as a
        # starting point — final notes and publishing are done manually. Idempotent: if a
        # release/draft for this tag already exists (e.g. created locally by release.ps1,
        # whose tag push also triggers this workflow), just replace the asset instead of
        # failing.
        run: >
          gh release create "${{ github.ref_name }}" dist/GaugeSetup-win-x64.exe
          --title "${{ github.ref_name }}" --draft --generate-notes
          || gh release upload "${{ github.ref_name }}" dist/GaugeSetup-win-x64.exe --clobber
