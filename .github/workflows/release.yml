# Builds the per-user installer and publishes a GitHub Release whenever a version
# tag (e.g. v0.1.0) is pushed. The in-app updater reads the same <Version>, so the
# tag must match Gauge.csproj's <Version> prefixed with "v".
#
# Local alternative: pwsh -File release.ps1 (see README).
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: pwsh -File build-installer.ps1

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/GaugeSetup-win-x64.exe --title "${{ github.ref_name }}" --generate-notes
