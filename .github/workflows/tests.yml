# Runs the xUnit test suite on every push and pull request. The project targets
# net10.0-windows (WinUI), so the suite can only build and run on a Windows runner.
name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test Gauge.Tests/Gauge.Tests.csproj -c Release
